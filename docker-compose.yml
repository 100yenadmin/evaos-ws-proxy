version: '3.8'
services:
  ws-proxy:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - ADMIN_EMAILS=${ADMIN_EMAILS:-admin@100yen.org}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LISTEN_ADDR=${LISTEN_ADDR:-:8080}
      - VM_CACHE_TTL=${VM_CACHE_TTL:-60s}
      - BACKEND_CONNECT_TIMEOUT=${BACKEND_CONNECT_TIMEOUT:-10s}
      - BACKEND_RECONNECT_ATTEMPTS=${BACKEND_RECONNECT_ATTEMPTS:-3}
      - MAX_CONNECTIONS=${MAX_CONNECTIONS:-5000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
